<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ghana Interviews Theme Preview</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="theme-page">
      <section class="theme-showcase" aria-labelledby="section-title">
        <h1 class="theme-showcase__title" id="section-title">
          We heard a few things across our conversations and we'd like you to
          hear them too
        </h1>

        <div class="theme-card">
          <div class="theme-card__tag" aria-label="Theme 1 title">
            <span class="theme-card__tag-index">01</span>
            <span class="theme-card__tag-text"
              >Reliability is Paystack's most valuable asset</span
            >
          </div>

          <div class="theme-card__body">
            <section class="theme-panel theme-panel--copy" aria-live="polite">
              <div class="merchant-copy">
                <h2 class="merchant-copy__title" id="merchant-name">
                  Africa World Airlines
                </h2>
                <p class="merchant-copy__body" id="merchant-copy"></p>
              </div>
            </section>

            <section class="theme-panel theme-panel--player" aria-label="Cassette player">
              <div class="player-stage">
                <div class="cassette-orbit" id="cassette-orbit" aria-hidden="true"></div>

                <div class="player-body">
                  <img
                    class="player-body__shell"
                    src="./Player Translucent.svg"
                    alt=""
                    aria-hidden="true"
                  />
                  <img
                    class="player-body__grill"
                    src="./Grill.png"
                    alt=""
                    aria-hidden="true"
                  />
                  <div class="player-body__window" aria-hidden="true"></div>
                  <span class="player-body__playback">PLAYBACK</span>

                  <button class="listen-pill" type="button" id="listen-button">
                    <span class="listen-pill__icon" aria-hidden="true">
                      <svg viewBox="0 0 256 256" focusable="false" aria-hidden="true">
                        <path
                          d="M240,128a15.74,15.74,0,0,1-7.6,13.51L88.32,229.65a16,16,0,0,1-16.2.3A15.86,15.86,0,0,1,64,216.13V39.87a15.86,15.86,0,0,1,8.12-13.82,16,16,0,0,1,16.2.3L232.4,114.49A15.74,15.74,0,0,1,240,128Z"
                          fill="currentColor"
                        />
                      </svg>
                    </span>
                    <span class="listen-pill__label" id="listen-label">Listen to Eric</span>
                  </button>
                </div>
              </div>
            </section>
          </div>
        </div>

        <nav class="merchant-nav" aria-label="Merchant carousel">
          <button class="merchant-nav__arrow" id="nav-prev" type="button" aria-label="Previous merchant">
            <svg viewBox="0 0 14 14" focusable="false" aria-hidden="true">
              <path d="M8.8 3.1L4.7 7l4.1 3.9" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.45" />
            </svg>
          </button>

          <button class="merchant-nav__icon merchant-nav__icon--active" data-index="0" type="button" aria-label="Africa World Airlines">
            <svg viewBox="0 0 256 256" focusable="false" aria-hidden="true">
              <path
                d="M209,81l-33,31,32,88-24,24-48-72-24,24v24L88,224,72,184,32,168l24-24H80l24-24L32,72,56,48l88,32,31-33A24,24,0,0,1,209,81Z"
                fill="currentColor"
                opacity="0.2"
              />
              <path
                d="M185.33,114.21l29.14-27.43.17-.16a32,32,0,0,0-45.26-45.26l-.16.17L141.79,70.67l-83-30.2a8,8,0,0,0-8.39,1.86l-24,24a8,8,0,0,0,1.22,12.31l63.89,42.59L76.69,136H56a8,8,0,0,0-5.65,2.34l-24,24A8,8,0,0,0,29,175.42l36.82,14.73,14.7,36.75.06.16a8,8,0,0,0,13.18,2.47l23.87-23.88A8,8,0,0,0,120,200V179.31l14.76-14.76,42.59,63.89a8,8,0,0,0,12.31,1.22l24-24a8,8,0,0,0,1.86-8.39Zm-.07,97.23-42.59-63.89A8,8,0,0,0,136.8,144a7.09,7.09,0,0,0-.79,0,8,8,0,0,0-5.66,2.34l-24,24A8,8,0,0,0,104,176v20.69L90.93,209.76,79.43,181A8,8,0,0,0,75,176.57l-28.74-11.5L59.32,152H80a8,8,0,0,0,5.66-2.34l24-24a8,8,0,0,0-1.22-12.32L44.56,70.74l13.5-13.49,83.22,30.26a8,8,0,0,0,8.56-2l30.94-32.88A16,16,0,0,1,203.4,75.22l-32.87,30.94a8,8,0,0,0-2,8.56l30.26,83.22Z"
                fill="currentColor"
              />
            </svg>
          </button>

          <button class="merchant-nav__icon" data-index="1" type="button" aria-label="Achieve by Petra">
            <svg viewBox="0 0 256 256" focusable="false" aria-hidden="true">
              <path
                d="M138.54,149.46C106.62,96.25,149.18,43.05,239.63,48.37,245,138.82,191.75,181.39,138.54,149.46ZM16.26,88.26c-3.8,64.61,34.21,95,72.21,72.21C111.27,122.47,80.87,84.46,16.26,88.26Z"
                fill="currentColor"
                opacity="0.2"
              />
              <path
                d="M247.63,47.89a8,8,0,0,0-7.52-7.52c-51.76-3-93.32,12.74-111.18,42.22-11.8,19.48-11.78,43.16-.16,65.74a71.37,71.37,0,0,0-14.17,26.95L98.33,159c7.82-16.33,7.52-33.36-1-47.49C84.09,89.73,53.62,78,15.79,80.27a8,8,0,0,0-7.52,7.52c-2.23,37.83,9.46,68.3,31.25,81.5A45.82,45.82,0,0,0,63.44,176,54.58,54.58,0,0,0,87,170.33l25,25V224a8,8,0,0,0,16,0V194.51a55.61,55.61,0,0,1,12.27-35,73.91,73.91,0,0,0,33.31,8.4,60.9,60.9,0,0,0,31.83-8.86C234.89,141.21,250.67,99.65,247.63,47.89ZM86.06,146.74l-24.41-24.4a8,8,0,0,0-11.31,11.31l24.41,24.41c-9.61,3.18-18.93,2.39-26.94-2.46C32.47,146.31,23.79,124.32,24,96c28.31-.25,50.31,8.47,59.6,23.81C88.45,127.82,89.24,137.14,86.06,146.74Zm111.06-1.36c-13.4,8.11-29.15,8.73-45.15,2l53.69-53.7a8,8,0,0,0-11.31-11.32L140.65,136c-6.76-16-6.15-31.76,2-45.15,13.94-23,47-35.8,89.33-34.83C232.94,98.34,220.14,131.44,197.12,145.38Z"
                fill="currentColor"
              />
            </svg>
          </button>

          <button class="merchant-nav__icon" data-index="2" type="button" aria-label="WARC">
            <svg viewBox="0 0 256 256" focusable="false" aria-hidden="true">
              <path
                d="M240,112v32a16,16,0,0,1-16,16h-8l-18.1,50.69a8,8,0,0,1-7.54,5.31H177.64a8,8,0,0,1-7.54-5.31L166.29,200H97.71L93.9,210.69A8,8,0,0,1,86.36,216H73.64a8,8,0,0,1-7.54-5.31L53,174a79.7,79.7,0,0,1-21-54h0a80,80,0,0,1,80-80h32a80,80,0,0,1,73.44,48.22,82.22,82.22,0,0,1,2.9,7.78H224A16,16,0,0,1,240,112Z"
                fill="currentColor"
                opacity="0.2"
              />
              <path
                d="M192,116a12,12,0,1,1-12-12A12,12,0,0,1,192,116ZM152,64H112a8,8,0,0,0,0,16h40a8,8,0,0,0,0-16Zm96,48v32a24,24,0,0,1-24,24h-2.36l-16.21,45.38A16,16,0,0,1,190.36,224H177.64a16,16,0,0,1-15.07-10.62L160.65,208h-57.3l-1.92,5.38A16,16,0,0,1,86.36,224H73.64a16,16,0,0,1-15.07-10.62L46,178.22a87.69,87.69,0,0,1-21.44-48.38A16,16,0,0,0,16,144a8,8,0,0,1-16,0,32,32,0,0,1,24.28-31A88.12,88.12,0,0,1,112,32H216a8,8,0,0,1,0,16H194.61a87.93,87.93,0,0,1,30.17,37c.43,1,.85,2,1.25,3A24,24,0,0,1,248,112Zm-16,0a8,8,0,0,0-8-8h-3.66a8,8,0,0,1-7.64-5.6A71.9,71.9,0,0,0,144,48H112A72,72,0,0,0,58.91,168.64a8,8,0,0,1,1.64,2.71L73.64,208H86.36l3.82-10.69A8,8,0,0,1,97.71,192h68.58a8,8,0,0,1,7.53,5.31L177.64,208h12.72l18.11-50.69A8,8,0,0,1,216,152h8a8,8,0,0,0,8-8Z"
                fill="currentColor"
              />
            </svg>
          </button>

          <button class="merchant-nav__arrow" id="nav-next" type="button" aria-label="Next merchant">
            <svg viewBox="0 0 14 14" focusable="false" aria-hidden="true">
              <path d="M5.2 3.1L9.3 7l-4.1 3.9" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.45" />
            </svg>
          </button>
        </nav>

        <details class="config-panel">
          <summary class="config-panel__summary">Config</summary>
          <div class="config-panel__body">
            <label class="config-panel__field" for="orbit-spacing">
              <span class="config-panel__label">Orbit spacing</span>
              <span class="config-panel__value" id="orbit-spacing-value">392px</span>
            </label>
            <input
              class="config-panel__slider"
              id="orbit-spacing"
              type="range"
              min="220"
              max="460"
              step="2"
              value="392"
            />
          </div>
        </details>
      </section>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
